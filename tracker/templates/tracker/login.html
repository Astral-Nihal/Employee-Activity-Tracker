<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkAnalytics OS - Secure Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f4f7f6;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-wrapper {
            display: flex;
            width: 900px;
            height: 500px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .login-branding {
            background: linear-gradient(135deg, #1e293b 0%, #3b82f6 100%);
            color: white;
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-form-container {
            flex: 1;
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-control {
            border-radius: 8px;
            padding: 12px 15px;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
        }

        .form-control:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.25);
        }

        .btn-primary {
            background-color: #3b82f6;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <div class="login-wrapper">
        <!-- Left Side: Branding -->
        <div class="login-branding">
            <h2 class="mb-4 fw-bold"><i class="bi bi-layers-fill text-info me-2"></i>WorkAnalytics OS</h2>
            <p class="fs-5 opacity-75 mb-4">Enterprise Workforce Intelligence & Real-Time Monitoring.</p>
            <div class="mt-auto">
                <small class="opacity-50">Unified Portal for Employees & Management</small>
            </div>
        </div>

        <!-- Right Side: Login Form -->
        <div class="login-form-container">
            <h3 class="mb-1 fw-bold text-dark">Welcome back</h3>
            <p class="text-muted mb-4 small">Please enter your credentials to access your dashboard.</p>

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label text-secondary small fw-bold">USERNAME</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-secondary small fw-bold">PASSWORD</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 shadow-sm">Sign In <i
                        class="bi bi-arrow-right-short"></i></button>

                {% if form.errors %}
                <div class="alert alert-danger mt-4 mb-0 py-2 border-0 text-center"
                    style="background-color: #fef2f2; color: #dc2626;" role="alert">
                    <small><i class="bi bi-exclamation-circle-fill me-1"></i> Invalid credentials.</small>
                </div>
                {% endif %}
            </form>
        </div>
    </div>

</body>

</html>
